services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: supermarket_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql:ro
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One single service serves BOTH the REST API (under /api) and the
  # frontend web app (everything else) -- see backend/src/app.js.
  # Open http://localhost:4000 in your browser for the whole app.
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: supermarket_pos
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 8h
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
